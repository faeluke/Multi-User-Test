# Test Bench for Xiaoyu

# Main source
Bench_Owner: Luke
measurement_strategy: "quad_dmm"

Instruments:
  Main_Source:
    Module_Name: drivers.HP6032Ax_driver
    Device: HP6032 # Just a comment
    Addr: "GPIB0::5::INSTR"
    Max_Voltage: 60
    Channels: 1

# Aux source
  Aux_Source:
    Module_Name: drivers.N8394X_driver
    Device: E3631 # Just a comment
    Addr: "GPIB0::10::INSTR"

  Load:  # Loads (Agregate loads have not been considered)
    Module_Name: drivers.Chroma_driver
    Device: C63200
    Addr: 'GPIB0::8::INSTR'

  Meter1:
    Module_Name: drivers.ag344_driver
    Device: AG34401
    Addr: 'GPIB0::11::INSTR'

  Meter2:
    Module_Name: drivers.ag344_driver
    Device: AG34401
    Addr: 'GPIB0::12::INSTR'

  Meter3:
    Module_Name: drivers.ag344_driver
    Device: AG34401
    Addr: 'GPIB0::13::INSTR'

  Meter4:
    Module_Name: drivers.ag344_driver
    Device: AG34401
    Addr: 'GPIB0::14::INSTR'

measurement_strategy: quad_dmm
#measurement_strategy: DAQ

measurement_setup:
  daq:
    mapping:
      vin: 101
      iin: 102
      vout: 103
      iout: 104
    shunts:
      iin_ohms: 0.010
      iout_ohms: 0.002
  
  quad_dmm:
    mapping:
      vin: Meter1
      iin: Meter2
      vout: Meter3
      iout: Meter4
    shunts:
      iin_ohms: 0.0004991
      iout_ohms: 0.00100059