# Test Bench for Xiaoyu

# Main source
Bench_Owner: Luke
measurement_strategy: "quad_dmm"

Instruments:
  Main_Source:
    Module_Name: drivers.HP6032x_driver
    Device: HP6032 # Just a comment
    Addr: "GPIB0::5::INSTR"
    Max_Voltage: 60
    Channels: 1

# Aux source
  Aux_Source:
    Module_Name: drivers.N8394X_driver
    Device: E363x # Just a comment
    Addr: "GPIB0::10::INSTR"
    Channel1: 
      Max_Voltage: 6
    Channel2: 
      Max_Voltage: 25      
    Channel3: 
      Max_Voltage: 25

  # Loads (Agregate loads have not been considered)
  Load:
    Module_Name: drivers.Chroma_driver
    Device: C63200
    Addr: 'GPIB0::8::INSTR'

  # Oscilloscope (Not configured yet)
  #O_Scope:
  #  Module_Name: 
  #  Device: Tekronix_MSO5
  #  Addr: 'USB0::'
  #  Channels: 4

  #Data_Aquisition:
  #  Module_Name: 
  #  Device: DAQ970A
  #  Addr: 'USB0::0x2A8D::0x5101::MY58050657::INSTR'
  #  Channels: 8

  Meter1:
    Module_Name: drivers.ag_344_driver
    Device: AG34401
    Addr: '"GPIB0::11::INSTR"

  Meter2:
    Module_Name: drivers.ag_344_driver
    Device: AG34401
    Addr: '"GPIB0::12::INSTR"'

  Meter3:
    Module_Name: drivers.ag_344_driver
    Device: AG34401
    Addr: '"GPIB0::13::INSTR"'

  Meter4:
    Module_Name: drivers.ag_344_driver
    Device: AG34401
    Addr: '"GPIB0::14::INSTR"'


  
measurement_strategy: quad_dmm
#measurement_strategy: DAQ

measurement_setup:
  daq:
    mapping:
      vin: 101
      iin: 102
      vout: 103
      iout: 104
    shunts:
      iin_ohms: 0.010
      iout_ohms: 0.002
  
  quad_dmm:
    mapping:
      vin: "dmm_vin"
      iin: "dmm_iin"
      vout: "dmm_vout"
      iout: "dmm_iout"
    shunts:
      iin_ohms: 0.0004991
      iout_ohms: 0.00100059


VIN_Measurement:
  Methodology: Meter1
  Channel: 1
  Method: Direct

IIN_Measurement:
  Methodology: Meter2
  Channel: 1
  Method: Shunt
  Value: 0.00100059

VOUT_Measurement:
  Methodology: Meter3
  Channel: 1
  Method: Direct

I_IN_Measurement:
  Methodology: Meter4
  Channel: 1
  Method: Shunt
  Value: 0.0004991

Vdrv_Measurement:
  Methodology: source
  Method: Aux

Idrv_Measurement:
  Methodology: source
  Method: Aux

Ictrl_Measurement:
  Methodology: source
  Method: Aux

Ictrl_Measurement:
  Methodology: source
  Method: Aux





